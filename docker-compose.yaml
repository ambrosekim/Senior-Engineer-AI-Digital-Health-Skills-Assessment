services:
  backend:
      build:
        context: ./backend
        dockerfile: Dockerfile
      restart: always
      environment:
        # Postgres
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=${POSTGRES_DB}
        - POSTGRES_HOST=${POSTGRES_HOST:-relational_db}
        - POSTGRES_PORT=${POSTGRES_PORT:-5432}
        # Ollama
        - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
        - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-all-minilm}
        - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-llama3.2}
        # App / CORS
        - EMBEDDING_DIM=${EMBEDDING_DIM:-384}
        - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      ports:
        - "${BACKEND_HOST_PORT:-6100}:6100"

  frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      command: npm start
      restart: always
      environment:
        # App / CORS
        - BACKEND_URL=${BACKEND_URL:-http://backend:6100}
      ports:
        - "${FRONTEND_HOST_PORT:-3000}:3000"

  chainlit:
      build:
        context: ./chainlit_app
        dockerfile: Dockerfile
      restart: always
      environment:
        # App / CORS
        - BACKEND_URL=${BACKEND_URL:-http://backend:6100}
        - CHAINLIT_AUTH_SECRET=${CHAINLIT_AUTH_SECRET}
        - CHAINLIT_USERNAME=${CHAINLIT_USERNAME}
        - CHAINLIT_PASSWORD=${CHAINLIT_PASSWORD}
      ports:
        - "${CHAINLIT_HOST_PORT:-8000}:8000"

  relational_db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      # Postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_volume:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"

  ollama:
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 3
        ollama pull all-minilm
        ollama pull llama3.2
        wait

volumes:
  db_volume:
  ollama_data: