services:
  backend:
      build:
        context: ./backend
        dockerfile: Dockerfile
      restart: always
      environment:
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=postgres
        - POSTGRES_DB=postgres
        - POSTGRES_HOST=relational_db
        - POSTGRES_PORT=5432
        - OLLAMA_HOST=http://ollama:11434
        - OLLAMA_EMBED_MODEL=all-minilm
        - EMBEDDING_DIM=384
        - CORS_ALLOWED_ORIGINS=http://localhost:3000
      ports:
        - "6100:6100"

  frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      command: npm start
      restart: always
      environment:
        - BACKEND_URL=http://backend:6100
      ports:
        - "3000:3000"

  chainlit:
      build:
        context: ./chainlit_app
        dockerfile: Dockerfile
      restart: always
      ports:
        - "8080:8000"
  
  relational_db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - db_volume:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  ollama:
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    ports:
      # Host 11435 (not 11434) to avoid clashing with a native Ollama
      # already bound to 127.0.0.1:11434 on the host. The backend always
      # reaches this container over the internal network at ollama:11434.
      - "11435:11434"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 3
        ollama pull all-minilm
        wait

volumes:
  db_volume:
  ollama_data: